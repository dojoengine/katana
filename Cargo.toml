[workspace]

resolver = "2"

members = [
    "crates/katana-cli",
    "crates/katana-core",
    "crates/katana-rpc"
]

[workspace.package]
version = "0.1.0"
edition = "2021"
repository = "https://github.com/dojoengine/katana/"
license = "Apache-2.0"
license-file = "LICENSE"

[workspace.dependencies]
anyhow = "1.0.66"
log = "0.4.17"
serde = "1.0.156"
thiserror = "1.0.32"
tokio = { version = "1.16", features = ["full"] }
starknet = { git = "https://github.com/xJonathanLEI/starknet-rs", rev = "91425ad" }
starknet_api = { git = "https://github.com/starkware-libs/starknet-api" }
cairo-lang-starknet = { git = "https://github.com/starkware-libs/cairo", version = "1.0.0-rc0" }

[patch."https://github.com/starkware-libs/blockifier"]
blockifier = { git = "https://github.com/dojoengine/blockifier", rev = "535725a5db32103654c54c12c2b8cb2c1d06ad55" }

[patch."https://github.com/starkware-libs/starknet-api"]
starknet_api = { git = "https://github.com/dojoengine/starknet-api", rev = "bc9dc6c24fdcef25771e9547885064116b7b7643" }
