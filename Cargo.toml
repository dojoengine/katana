[workspace]
resolver = "2"
members = [
    "clients/amd_tee_registry_client",
    "clients/katana_tee_client",
]

# Exclude submodule workspaces - they manage their own builds
exclude = [
    "crates/katana",
    "crates/amd-sev-snp-attestation-sdk",
    "crates/starknet-rust",
]

[workspace.package]
edition = "2021"
version = "0.1.0"
license = "Apache-2.0"

# =============================================================================
# Workspace dependencies
# =============================================================================
[workspace.dependencies]
# Our own crates
amd_tee_registry_client = { path = "clients/amd_tee_registry_client" }
katana_tee_client = { path = "clients/katana_tee_client" }

# AMD SEV-SNP SDK crates (from submodule)
amd-sev-snp-attestation-prover = { path = "crates/amd-sev-snp-attestation-sdk/crates/prover", default-features = false, features = ["sp1"] }
amd-sev-snp-attestation-verifier = { path = "crates/amd-sev-snp-attestation-sdk/crates/verifier", default-features = false }
sp1-methods = { path = "crates/amd-sev-snp-attestation-sdk/crates/sp1-methods" }
x509-verifier-rust-crypto = { path = "crates/amd-sev-snp-attestation-sdk/crates/x509-verifier-rust-crypto" }

# -----------------------------------------------------------------------------
# Common dependencies
# -----------------------------------------------------------------------------
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
tracing = "0.1"
hex = "0.4"
reqwest = { version = "0.12", features = ["rustls-tls", "blocking"] }
anyhow = "1"

# SP1 SDK dependencies (matching AMD SDK versions exactly)
sp1-sdk = { version = "5.2.1", default-features = false, features = ["network"] }
alloy-primitives = { version = "=1.3.1", default-features = false }
alloy-sol-types = { version = "=1.3.1", features = ["json"] }
bincode = "1.3.3"
lazy_static = "1.5.0"
dotenvy = "0.15"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
