# One-command Katana + Saya-TEE dev stack (mock-prove variant).
#
# Prereqs: Docker, an L2 settlement layer with a funded account, and a TEE
# registry mock already deployed on that L2 (see README for how to deploy
# one). The compose only consumes its address — production katana takes a
# `--tee-registry-address` pointer too, so this matches the production shape.
#
# Usage:
#   1. cp docker/tee-mock.env.example .env
#   2. Fill in SETTLEMENT_* + TEE_REGISTRY_ADDRESS in .env
#   3. docker compose -f docker/tee-mock.compose.yml --env-file .env up --build
#   4. Drive L3 at http://localhost:5050
#
# See docker/README.md for details. For real AMD SEV-SNP attestation,
# see the v2 follow-up issue (not this file).

name: katana-tee-mock

services:
  # 1) One-shot: `katana init rollup --tee` declares + deploys Piltover on L2,
  #    wires it for TEE proofs (set_program_info + set_facts_registry pointing
  #    at the mock TEE registry the user supplied), and writes the chain config
  #    locally.
  init-chain:
    image: ghcr.io/dojoengine/katana-tee-mock:dev
    build:
      context: ..
      dockerfile: docker/Dockerfile.tee-mock
      args:
        TEE_MOCK: "1"
    entrypoint: ["/bin/sh", "/scripts/init-chain.sh"]
    environment:
      SETTLEMENT_RPC_URL: ${SETTLEMENT_RPC_URL:?SETTLEMENT_RPC_URL is required}
      SETTLEMENT_ACCOUNT_ADDRESS: ${SETTLEMENT_ACCOUNT_ADDRESS:?SETTLEMENT_ACCOUNT_ADDRESS is required}
      SETTLEMENT_ACCOUNT_PRIVATE_KEY: ${SETTLEMENT_ACCOUNT_PRIVATE_KEY:?SETTLEMENT_ACCOUNT_PRIVATE_KEY is required}
      TEE_REGISTRY_ADDRESS: ${TEE_REGISTRY_ADDRESS:?TEE_REGISTRY_ADDRESS is required}
      CHAIN_ID: ${CHAIN_ID:-katana_tee_mock}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./scripts:/scripts:ro
      - chain-config:/root/.config/katana
    restart: "no"

  # 2) Long-running: L3 rollup katana with mock TEE provider.
  katana:
    image: ghcr.io/dojoengine/katana-tee-mock:dev
    build:
      context: ..
      dockerfile: docker/Dockerfile.tee-mock
      args:
        TEE_MOCK: "1"
    command:
      - "--chain"
      - "${CHAIN_ID:-katana_tee_mock}"
      - "--http.addr"
      - "0.0.0.0"
      - "--http.port"
      - "5050"
      - "--block-time"
      - "${BLOCK_TIME:-3000}"
      - "--tee"
      - "mock"
      - "--dev"
      - "--dev.no-fee"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - chain-config:/root/.config/katana:ro
    ports:
      - "5050:5050"
    depends_on:
      init-chain:
        condition: service_completed_successfully
    healthcheck:
      # Minimal JSON-RPC ping. Replace with /health if katana exposes one.
      test: ["CMD-SHELL", "wget -qO- --post-data='{\"jsonrpc\":\"2.0\",\"id\":1,\"method\":\"starknet_chainId\",\"params\":[]}' --header='Content-Type: application/json' http://localhost:5050 | grep -q result"]
      interval: 2s
      timeout: 2s
      retries: 30

  # 3) Long-running: saya-tee polls L3, settles on L2 via piltover.
  saya-tee:
    image: katana-tee-mock-saya:pinned
    build:
      context: ..
      dockerfile: docker/Dockerfile.saya
    entrypoint: ["/bin/sh", "/scripts/saya-tee.sh"]
    environment:
      SETTLEMENT_ACCOUNT_ADDRESS: ${SETTLEMENT_ACCOUNT_ADDRESS:?}
      SETTLEMENT_ACCOUNT_PRIVATE_KEY: ${SETTLEMENT_ACCOUNT_PRIVATE_KEY:?}
      SETTLEMENT_RPC_URL: ${SETTLEMENT_RPC_URL:?}
      TEE_REGISTRY_ADDRESS: ${TEE_REGISTRY_ADDRESS:?}
      BATCH_SIZE: ${BATCH_SIZE:-1}
      RUST_LOG: ${SAYA_TEE_LOG:-info,persistent_tee=debug}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./scripts:/scripts:ro
      - chain-config:/root/.config/katana:ro
      - saya-tee-db:/var/lib/saya-tee
    depends_on:
      katana:
        condition: service_healthy

volumes:
  # Katana chain config, generated by init-chain, read by katana and saya-tee.
  chain-config:
  # saya-tee's block cursor DB. Survives `down && up` without `-v`.
  saya-tee-db:
