# One-command Katana + Saya-TEE dev stack (mock-prove variant).
#
# Prereqs: Docker, and an L2 settlement layer you can write to (Starknet
# Sepolia, a mainnet RPC with a funded account, a local devnet — anything
# with JSON-RPC that speaks Starknet).
#
# Usage:
#   1. cp docker/tee-mock.env.example .env
#   2. Fill in SETTLEMENT_* values in .env
#   3. docker compose -f docker/tee-mock.compose.yml --env-file .env up --build
#   4. Drive L3 at http://localhost:5050
#
# See docker/README.md for details. For real AMD SEV-SNP attestation,
# see the v2 follow-up issue (not this file).

name: katana-tee-mock

services:
  # 1) One-shot: declare + deploy piltover + mock TEE registry on user's L2.
  deploy-contracts:
    image: ghcr.io/dojoengine/saya:latest
    entrypoint: ["/bin/sh", "/scripts/deploy-contracts.sh"]
    environment:
      SETTLEMENT_RPC_URL: ${SETTLEMENT_RPC_URL:?SETTLEMENT_RPC_URL is required}
      SETTLEMENT_ACCOUNT_ADDRESS: ${SETTLEMENT_ACCOUNT_ADDRESS:?SETTLEMENT_ACCOUNT_ADDRESS is required}
      SETTLEMENT_ACCOUNT_PRIVATE_KEY: ${SETTLEMENT_ACCOUNT_PRIVATE_KEY:?SETTLEMENT_ACCOUNT_PRIVATE_KEY is required}
      SETTLEMENT_CHAIN_ID: ${SETTLEMENT_CHAIN_ID:?SETTLEMENT_CHAIN_ID is required}
      CHAIN_ID: ${CHAIN_ID:-katana_tee_mock}
      TEE_REGISTRY_SALT: ${TEE_REGISTRY_SALT:-0x7ee}
      PILTOVER_SALT: ${PILTOVER_SALT:-0x9117f0}
      RUST_LOG: ${SAYA_OPS_LOG:-info}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./scripts:/scripts:ro
      - bootstrap:/shared
    restart: "no"

  # 2) One-shot: generate the L3 rollup chain spec from deployed contract addresses.
  init-chain:
    image: ghcr.io/dojoengine/katana-tee-mock:dev
    build:
      context: ..
      dockerfile: docker/Dockerfile.tee-mock
    entrypoint: ["/bin/sh", "/scripts/init-chain.sh"]
    environment:
      SETTLEMENT_RPC_URL: ${SETTLEMENT_RPC_URL:?}
      SETTLEMENT_ACCOUNT_ADDRESS: ${SETTLEMENT_ACCOUNT_ADDRESS:?}
      SETTLEMENT_ACCOUNT_PRIVATE_KEY: ${SETTLEMENT_ACCOUNT_PRIVATE_KEY:?}
      CHAIN_ID: ${CHAIN_ID:-katana_tee_mock}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./scripts:/scripts:ro
      - bootstrap:/shared:ro
      - chain-config:/root/.config/katana
    depends_on:
      deploy-contracts:
        condition: service_completed_successfully
    restart: "no"

  # 3) Long-running: L3 rollup katana with mock TEE provider.
  katana:
    image: ghcr.io/dojoengine/katana-tee-mock:dev
    build:
      context: ..
      dockerfile: docker/Dockerfile.tee-mock
    command:
      - "--chain"
      - "${CHAIN_ID:-katana_tee_mock}"
      - "--http.addr"
      - "0.0.0.0"
      - "--http.port"
      - "5050"
      - "--block-time"
      - "${BLOCK_TIME:-3000}"
      - "--tee.provider"
      - "mock"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - chain-config:/root/.config/katana:ro
    ports:
      - "5050:5050"
    depends_on:
      init-chain:
        condition: service_completed_successfully
    healthcheck:
      # Minimal JSON-RPC ping. Replace with /health if katana exposes one.
      test: ["CMD-SHELL", "wget -qO- --post-data='{\"jsonrpc\":\"2.0\",\"id\":1,\"method\":\"starknet_chainId\",\"params\":[]}' --header='Content-Type: application/json' http://localhost:5050 | grep -q result"]
      interval: 2s
      timeout: 2s
      retries: 30

  # 4) Long-running: saya-tee polls L3, settles on L2 via piltover.
  saya-tee:
    image: ghcr.io/dojoengine/saya:latest
    entrypoint: ["/bin/sh", "/scripts/saya-tee.sh"]
    environment:
      SETTLEMENT_ACCOUNT_ADDRESS: ${SETTLEMENT_ACCOUNT_ADDRESS:?}
      SETTLEMENT_ACCOUNT_PRIVATE_KEY: ${SETTLEMENT_ACCOUNT_PRIVATE_KEY:?}
      SETTLEMENT_RPC_URL: ${SETTLEMENT_RPC_URL:?}
      BATCH_SIZE: ${BATCH_SIZE:-1}
      RUST_LOG: ${SAYA_TEE_LOG:-info,persistent_tee=debug}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./scripts:/scripts:ro
      - bootstrap:/shared:ro
      - saya-tee-db:/var/lib/saya-tee
    depends_on:
      katana:
        condition: service_healthy

volumes:
  # Shared bootstrap state (piltover + tee_registry addresses).
  bootstrap:
  # Katana chain config, generated by init-chain, read by katana.
  chain-config:
  # saya-tee's block cursor DB. Survives `down && up` without `-v`.
  saya-tee-db:
