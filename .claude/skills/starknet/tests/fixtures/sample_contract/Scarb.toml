[package]
name = "sample_contract"
version = "0.1.0"
edition = "2024_07"

[dependencies]
starknet = "2.15.0"

[dev-dependencies]
snforge_std = "0.54.1"
assert_macros = "2.15.0"

[[target.starknet-contract]]
sierra = true

[scripts]
test = "snforge test"

[tool.snforge]
exit_first = "$SNFORGE_EXIT_FIRST"
fuzzer_runs = "$SNFORGE_FUZZER_RUNS"
fuzzer_seed = "$SNFORGE_FUZZER_SEED"

[tool.scarb]
allow-prebuilt-plugins = ["snforge_std"]
