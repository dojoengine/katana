[package]
name = "katana_tee_client"
version.workspace = true
edition.workspace = true
description = "Katana TEE client - fetch attestations from Katana RPC and generate proofs"

[dependencies]
# AMD TEE registry client for attestation proving
amd_tee_registry_client = { workspace = true }

# Re-export types from AMD SDK for proof handling
amd-sev-snp-attestation-prover = { workspace = true }

# Starknet (local submodule)
starknet-rust-core = { path = "../../crates/starknet-rust/starknet-rust-core" }
starknet-rust-providers = { path = "../../crates/starknet-rust/starknet-rust-providers" }
starknet-rust-accounts = { path = "../../crates/starknet-rust/starknet-rust-accounts" }
starknet-rust-signers = { path = "../../crates/starknet-rust/starknet-rust-signers" }
url = "2"

# HTTP client for Katana RPC
reqwest = { workspace = true }

# Async runtime
tokio = { workspace = true }

# Serialization
serde = { workspace = true }
serde_json = { workspace = true }

# Error handling
thiserror = { workspace = true }
anyhow = { workspace = true }

# Logging
tracing = { workspace = true }

# Hex encoding
hex = { workspace = true }

# Environment variables
dotenvy = { workspace = true }

# CLI dependencies
clap = { version = "4", features = ["derive"] }
tracing-subscriber = { workspace = true }

[dev-dependencies]
amd-sev-snp-attestation-verifier = { workspace = true }
x509-verifier-rust-crypto = { workspace = true }
sha2 = "0.10"

[[example]]
name = "debug_attestation"
path = "examples/debug_attestation.rs"

[[bin]]
name = "katana-tee"
path = "src/bin/cli.rs"
