name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  CARGO_TERM_COLOR: always

jobs:
  cairo-test:
    name: Cairo Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: software-mansion/setup-scarb@v1
        with:
          scarb-version: "2.15.0"
      - uses: foundry-rs/setup-snfoundry@v4
      - name: Run amd_tee_registry tests
        working-directory: contracts/amd_tee_registry
        run: snforge test
      - name: Run katana_tee tests
        working-directory: contracts/katana_tee
        run: snforge test
