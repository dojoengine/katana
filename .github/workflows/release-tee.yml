name: release-reproducible-katana

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.7.0). If empty, uses version from Cargo.toml"
        type: string
        required: false
      upload_to_release:
        description: "Upload artifacts to the matching GitHub release"
        type: boolean
        default: false

env:
  CARGO_TERM_COLOR: always

permissions:
  id-token: write
  attestations: write
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      source_date_epoch: ${{ steps.release_info.outputs.source_date_epoch }}
      tag_name: ${{ steps.release_info.outputs.tag_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get release metadata
        id: release_info
        shell: bash
        run: |
          set -euo pipefail

          if [[ -n "${{ github.event.inputs.tag }}" ]]; then
            TAG_NAME="${{ github.event.inputs.tag }}"
          else
            cargo install cargo-get --locked
            TAG_NAME="v$(cargo get workspace.package.version)"
          fi

          SOURCE_DATE_EPOCH="$(git log -1 --format=%ct)"

          echo "tag_name=${TAG_NAME}" >> "$GITHUB_OUTPUT"
          echo "source_date_epoch=${SOURCE_DATE_EPOCH}" >> "$GITHUB_OUTPUT"

  build-contracts:
    runs-on: ubuntu-latest
    needs: prepare
    container:
      image: ghcr.io/dojoengine/katana-dev:latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Mark workspace safe
        run: git config --global --add safe.directory "*"

      - name: Build contracts
        run: make contracts

      - name: Upload contract artifacts
        uses: actions/upload-artifact@v4
        with:
          name: contract-artifacts
          path: ./crates/contracts/build
          retention-days: 1

  reproducible-build:
    name: Reproducible Katana Linux amd64
    needs: [prepare, build-contracts]
    runs-on: ubuntu-latest-8-cores
    outputs:
      binary-sha256: ${{ steps.hash.outputs.binary_sha256 }}
      binary-sha384: ${{ steps.hash.outputs.binary_sha384 }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Download contract artifacts
        uses: actions/download-artifact@v4
        with:
          name: contract-artifacts
          path: ./crates/contracts/build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build reproducible artifact
        id: hash
        shell: bash
        env:
          SOURCE_DATE_EPOCH: ${{ needs.prepare.outputs.source_date_epoch }}
          VERSION_NAME: ${{ needs.prepare.outputs.tag_name }}
        run: |
          set -euo pipefail

          FILE_VERSION="$(printf '%s' "$VERSION_NAME" | tr '/' '-')"
          PACKAGE_DIR="katana_${FILE_VERSION}_linux_amd64_reproducible"

          ./scripts/build-reproducible-katana.sh \
            --version "$VERSION_NAME" \
            --source-date-epoch "$SOURCE_DATE_EPOCH" \
            --output-dir dist/reproducible-katana \
            --archive-name "${PACKAGE_DIR}.tar.gz" \
            --package-dir "$PACKAGE_DIR"

          source dist/reproducible-katana/manifest.env
          echo "binary_sha256=${BINARY_SHA256}" >> "$GITHUB_OUTPUT"
          echo "binary_sha384=${BINARY_SHA384}" >> "$GITHUB_OUTPUT"

      - name: Generate build provenance attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            ./dist/reproducible-katana/katana
            ./dist/reproducible-katana/*.tar.gz

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: reproducible-katana-linux-amd64
          path: |
            dist/reproducible-katana/katana
            dist/reproducible-katana/build-info.txt
            dist/reproducible-katana/*.tar.gz
            dist/reproducible-katana/*.sha256
            dist/reproducible-katana/*.sha384
          retention-days: 30

      - name: Upload artifacts to GitHub release
        if: inputs.upload_to_release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION_NAME: ${{ needs.prepare.outputs.tag_name }}
        run: |
          set -euo pipefail

          if ! gh release view "$VERSION_NAME" >/dev/null 2>&1; then
            gh release create "$VERSION_NAME" --draft --generate-notes
          fi

          gh release upload "$VERSION_NAME" \
            dist/reproducible-katana/katana \
            dist/reproducible-katana/build-info.txt \
            dist/reproducible-katana/*.tar.gz \
            dist/reproducible-katana/*.sha256 \
            dist/reproducible-katana/*.sha384 \
            --clobber

      - name: Summary
        shell: bash
        run: |
          {
            echo "## Reproducible Katana Build"
            echo ""
            echo "**Version:** ${{ needs.prepare.outputs.tag_name }}"
            echo "**SOURCE_DATE_EPOCH:** ${{ needs.prepare.outputs.source_date_epoch }}"
            echo "**Binary SHA-256:** \`${{ steps.hash.outputs.binary_sha256 }}\`"
            echo "**Binary SHA-384:** \`${{ steps.hash.outputs.binary_sha384 }}\`"
            echo ""
            echo "The workflow built the binary twice from a clean Docker build and compared the outputs byte-for-byte."
          } >> "$GITHUB_STEP_SUMMARY"
