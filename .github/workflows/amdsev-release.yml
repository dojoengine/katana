name: amdsev-release

# Builds the Katana TEE VM image (OVMF + kernel + initrd, with a katana
# binary embedded in the initrd) from misc/AMDSEV, computes the
# sealed-storage SEV-SNP launch measurement, and publishes a
# `tee-vm-v<X.Y.Z>+katana-<katana tag>` GitHub Release with the artifacts.
#
# This is the reusable build engine. It is NOT triggered by katana releases:
# TEE VM releases are cut deliberately, with their own dedicated version,
# through the `amdsev-release-dispatch` workflow.
#
# Trigger contract
# ----------------
# 1. `workflow_call` (primary) — invoked by amdsev-release-dispatch. The
#    caller supplies the dedicated TEE VM version (`vm_version`) and the
#    katana release tag to bundle (`katana_version`). The published tag is
#    `tee-vm-v<vm_version>+katana-<katana_version>`: the dedicated TEE VM
#    version, with the embedded katana version attached as SemVer build
#    metadata so the tag self-documents what it bundles. The VM is built
#    from the dispatch's ref (the workflow_dispatch runs against a chosen
#    branch/tag), so the misc/AMDSEV tooling and the embedded binary are a
#    consistent pair.
# 2. `workflow_dispatch` — dry run: identical build + measurement, artifacts
#    uploaded to the workflow run, but no GitHub Release created. Takes only
#    a katana version (the dry run has no dedicated TEE version).
#
# After publishing, the hardware end-to-end test (amdsev-snp-e2e) is
# dispatched against the new VM release (a release created with GITHUB_TOKEN
# does not re-trigger workflows, but workflow_dispatch from GITHUB_TOKEN is
# allowed).
#
# Runner
# ------
# Runs on stock `ubuntu-latest`. None of the build steps require AMD SEV-SNP
# hardware — OVMF is cross-compiled, kernel comes from a Ubuntu .deb,
# snp-digest is pure userspace hashing. SEV-SNP hardware is only needed at
# VM-boot time, which is outside this workflow.

on:
  workflow_call:
    inputs:
      vm_version:
        description: 'Dedicated TEE VM version to publish (SemVer, no prefix; e.g. 0.1.0 or 1.0.0-rc.1)'
        required: true
        type: string
      katana_version:
        description: 'Katana release tag to bundle and attach to the VM tag (e.g. v1.8.0-rc.5)'
        required: true
        type: string
      publish:
        description: 'Create the GitHub Release (false = build + measure only)'
        required: false
        type: boolean
        default: true
      force_rebuild:
        description: 'Rebuild OVMF and kernel even when the previous release used identical pins'
        required: false
        type: boolean
        default: false
  workflow_dispatch:
    inputs:
      katana_version:
        description: 'Katana release tag to bundle (dry run only; e.g. v1.0.0, or "latest")'
        required: true
        default: 'latest'
        type: string
      force_rebuild:
        description: 'Rebuild OVMF and kernel even when the previous release used identical pins'
        required: false
        type: boolean
        default: false

defaults:
  run:
    working-directory: misc/AMDSEV

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
      # Builds from the workflow's ref. For a published release that is the
      # ref the dispatch was run against (default branch, or a chosen
      # branch/tag); for a dry run it is whatever was dispatched. The
      # misc/AMDSEV tooling and the embedded binary are thus paired by that
      # commit, recorded via SOURCE_DATE_EPOCH below.
      - uses: actions/checkout@v4

      - name: Resolve release context
        id: ctx
        env:
          EVENT_NAME: ${{ github.event_name }}
          IN_VM_VERSION: ${{ inputs.vm_version }}
          IN_KATANA_VERSION: ${{ inputs.katana_version }}
          IN_PUBLISH: ${{ inputs.publish }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Resolve the katana version. `latest` (dry-run convenience) maps to
          # the newest katana release — its own vX.Y.Z namespace, never a
          # tee-vm-v* VM release.
          katana_ver="$IN_KATANA_VERSION"
          [ -z "$katana_ver" ] && katana_ver="latest"
          if [ "$katana_ver" = "latest" ]; then
            katana_ver="$(gh release list --repo "$GITHUB_REPOSITORY" --exclude-drafts --limit 50 \
              --json tagName --jq '[.[].tagName | select(test("^v[0-9]"))][0]')"
            [ -n "$katana_ver" ] || { echo "could not resolve latest katana release" >&2; exit 1; }
          fi

          # A workflow_call from amdsev-release-dispatch supplies vm_version and
          # is a real, dedicatedly-versioned release; a direct workflow_dispatch
          # of this workflow has no vm_version and is a dry run.
          #
          # NOTE: do not key this off github.event_name — a called reusable
          # workflow reports the CALLER's event, which is itself
          # workflow_dispatch, so both paths would look identical.
          if [ -z "$IN_VM_VERSION" ]; then
            # Dry run: build + measure, never publish.
            vm_tag=""
            publish=0
            prerelease=false
          else
            # tee-vm-v<X.Y.Z>+katana-<katana tag>: the dedicated TEE VM version,
            # with the embedded katana version attached as SemVer build metadata.
            vm_tag="tee-vm-v${IN_VM_VERSION}+katana-${katana_ver}"
            if [ "$IN_PUBLISH" = "false" ]; then publish=0; else publish=1; fi
            # Pre-release if either the TEE version or the embedded katana
            # version carries a pre-release segment.
            if printf '%s\n%s\n' "$IN_VM_VERSION" "$katana_ver" | grep -qiE -- '-(rc|alpha|beta|preview|dev)'; then
              prerelease=true
            else
              prerelease=false
            fi
          fi
          {
            echo "katana_ver=$katana_ver"
            echo "vm_tag=$vm_tag"
            echo "publish=$publish"
            echo "prerelease=$prerelease"
            echo "sha=$(git rev-parse HEAD)"
          } >> "$GITHUB_OUTPUT"
          echo "event=$EVENT_NAME katana_ver=$katana_ver vm_tag=${vm_tag:-<none>} publish=$publish prerelease=$prerelease"

      - name: Pin SOURCE_DATE_EPOCH to HEAD commit time
        # Without this, build.sh falls back to `date +%s` and embeds the
        # wall-clock build time into the initrd cpio mtimes — producing
        # different bytes (and a different launch measurement) on every run
        # of the same source. Anchoring to the commit time makes the published
        # measurement a function of (commit + katana version + LUKS_UUID),
        # fully reproducible by anyone rebuilding from the same ref. (OVMF
        # derives its own epoch from the pinned OVMF commit — see
        # scripts/build-ovmf.sh.)
        run: echo "SOURCE_DATE_EPOCH=$(git log -1 --format=%ct)" >> "$GITHUB_ENV"

      - name: Install build dependencies
        run: |
          sudo apt-get update
          # nasm, iasl, uuid-dev: EDK2 / OVMF build toolchain
          # musl-tools:           linker for the snp-derivekey musl cross-compile
          # zstd, cpio:           initrd packaging
          sudo apt-get install -y --no-install-recommends \
            nasm iasl uuid-dev \
            musl-tools \
            zstd cpio

      - name: Install Rust musl target
        # Run inside snp-tools so its rust-toolchain.toml selects the same
        # toolchain build.sh will use for the snp-derivekey build.
        working-directory: misc/AMDSEV/snp-tools
        run: rustup target add x86_64-unknown-linux-musl

      - name: Download katana linux binary
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          KATANA_VER: ${{ steps.ctx.outputs.katana_ver }}
        run: |
          mkdir -p .katana-dl
          # $KATANA_VER is the concrete katana release tag resolved in the ctx
          # step (`latest` is already mapped to a real tag there). katana
          # releases ship several products per tag: katana_*, paymaster-service_*,
          # vrf-server_* — katana with portable (_linux_amd64.tar.gz) and
          # cairo-native (_linux_amd64_native.tar.gz) variants. The `katana_`
          # prefix selects the product (the sidecars are fetched by the next
          # step); the `_native` suffix selects the cairo-native build
          # (LLVM/MLIR statically linked; its DT_NEEDED set is covered by the
          # initrd's GLIBC_RUNTIME_PACKAGES pins) so the guest supports
          # --enable-native-compilation. The pattern uniquely matches one
          # asset. NOTE: unlike the portable variant, the native asset is a
          # plain GH-runner build — NOT reproducible-from-source yet; the
          # image's verification story bottoms out at this asset's recorded
          # sha256 (KATANA_BINARY_SHA256 + KATANA_ASSET_VARIANT in
          # build-info.txt).
          gh release download "$KATANA_VER" \
            --repo dojoengine/katana \
            --pattern 'katana_*_linux_amd64_native.tar.gz' \
            --dir .katana-dl/
          tar -xzf .katana-dl/*.tar.gz -C .katana-dl/
          KATANA_BIN="$(find "$PWD/.katana-dl" -type f -name katana -perm -u+x | head -n1)"
          if [ -z "$KATANA_BIN" ]; then
            echo "katana binary not found in downloaded asset" >&2
            exit 1
          fi
          echo "KATANA_BIN=$KATANA_BIN" >> "$GITHUB_ENV"

      - name: Download sidecar binaries (paymaster-service, vrf-server)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          KATANA_VER: ${{ steps.ctx.outputs.katana_ver }}
        run: |
          mkdir -p .sidecar-dl
          # The sidecars ship on the same katana release (release.yml's
          # build-sidecars job). No `_native` variants exist for them, so each
          # pattern matches exactly one asset. Bundled into the initrd so the
          # guest supports --paymaster/--vrf without the (non-interactive,
          # enclave-fatal) auto-install path.
          gh release download "$KATANA_VER" \
            --repo dojoengine/katana \
            --pattern 'paymaster-service_*_linux_amd64.tar.gz' \
            --pattern 'vrf-server_*_linux_amd64.tar.gz' \
            --pattern 'checksums.txt' \
            --dir .sidecar-dl/
          # checksums.txt (release.yml's generate-checksums job) covers every
          # release artifact including the sidecar tarballs — verify before use.
          (cd .sidecar-dl && grep -E ' (paymaster-service|vrf-server)_[^ ]*_linux_amd64\.tar\.gz$' checksums.txt | sha256sum -c -)
          tar -xzf .sidecar-dl/paymaster-service_*_linux_amd64.tar.gz -C .sidecar-dl/
          tar -xzf .sidecar-dl/vrf-server_*_linux_amd64.tar.gz -C .sidecar-dl/
          PAYMASTER_BIN="$(find "$PWD/.sidecar-dl" -type f -name paymaster-service | head -n1)"
          VRF_BIN="$(find "$PWD/.sidecar-dl" -type f -name vrf-server | head -n1)"
          if [ -z "$PAYMASTER_BIN" ] || [ -z "$VRF_BIN" ]; then
            echo "sidecar binary missing after extract" >&2
            exit 1
          fi
          chmod +x "$PAYMASTER_BIN" "$VRF_BIN"
          {
            echo "PAYMASTER_BIN=$PAYMASTER_BIN"
            echo "VRF_BIN=$VRF_BIN"
          } >> "$GITHUB_ENV"

      - name: Reuse OVMF/kernel from previous release when pins are unchanged
        # Only the initrd actually changes between releases when the OVMF
        # commit and kernel pins are untouched. Reuse saves the ~10-minute
        # EDK2 build and shields the measurement from toolchain drift on
        # ubuntu-latest: verifiers see only the initrd hash move when only
        # katana moved. Every reused artifact is verified against the
        # SHA-256 recorded in the previous release's build-info.txt; any
        # mismatch or missing data falls back to a full rebuild of that
        # component. Only tee-vm-v* releases are considered — katana's own
        # vX.Y.Z releases carry no VM build-info.
        if: github.event.inputs.force_rebuild != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VM_TAG: ${{ steps.ctx.outputs.vm_tag }}
        run: |
          . ./build-config

          mkdir -p output/qemu prev-release
          REUSE_OVMF=0
          REUSE_KERNEL=0
          PREV_TAG=""

          # Latest published VM release (tee-vm-v* namespace only), excluding
          # the tag being built (relevant on re-runs after the release object
          # already exists). VM_TAG is empty on dry runs, which excludes
          # nothing.
          PREV_TAG="$(gh release list --repo "$GITHUB_REPOSITORY" --exclude-drafts --limit 50 --json tagName --jq '.[].tagName' \
            | grep '^tee-vm-v' | grep -vFx "${VM_TAG}" | head -n1 || true)"

          if [ -z "$PREV_TAG" ]; then
            echo "No previous VM release found — building all components."
          elif ! gh release download "$PREV_TAG" --repo "$GITHUB_REPOSITORY" \
                 --pattern "build-info-${PREV_TAG}.txt" --output prev-release/build-info.txt; then
            echo "Previous release $PREV_TAG has no build-info — building all components."
          else
            echo "Previous release: $PREV_TAG"
            info_prev() {
              awk -F= -v k="$1" '$1 == k { sub(/^[^=]*=/, ""); print; exit }' prev-release/build-info.txt
            }

            WANT_OVMF=0
            WANT_KERNEL=0
            # OVMF reuse additionally requires the previous artifact to carry
            # OVMF_SOURCE_DATE_EPOCH — i.e. to have been built under the
            # "epoch = OVMF commit time" rule (build-ovmf.sh). Artifacts from
            # before that rule were built with their release's epoch and are
            # not reproducible from a tag checkout, so they get rebuilt once.
            # Within the rule, an OVMF_COMMIT match implies an epoch match,
            # because the epoch is a pure function of the commit.
            [ "$(info_prev OVMF_COMMIT)" = "$OVMF_COMMIT" ] \
              && [ -n "$(info_prev OVMF_SHA256)" ] \
              && [ -n "$(info_prev OVMF_SOURCE_DATE_EPOCH)" ] && WANT_OVMF=1
            [ "$(info_prev KERNEL_VERSION)" = "$KERNEL_VERSION" ] \
              && [ "$(info_prev KERNEL_PKG_SHA256)" = "$KERNEL_PKG_SHA256" ] \
              && [ -n "$(info_prev KERNEL_SHA256)" ] && WANT_KERNEL=1

            if [ "$WANT_OVMF" -eq 1 ] || [ "$WANT_KERNEL" -eq 1 ]; then
              gh release download "$PREV_TAG" --repo "$GITHUB_REPOSITORY" \
                --pattern "katana-tee-vm-${PREV_TAG}.tar.gz" --dir prev-release/
              tar -xzf "prev-release/katana-tee-vm-${PREV_TAG}.tar.gz" -C prev-release/
            fi

            if [ "$WANT_OVMF" -eq 1 ] && [ -f prev-release/OVMF.fd ]; then
              ACTUAL="$(sha256sum prev-release/OVMF.fd | awk '{print $1}')"
              if [ "$ACTUAL" = "$(info_prev OVMF_SHA256)" ]; then
                cp prev-release/OVMF.fd output/qemu/OVMF.fd
                REUSE_OVMF=1
                echo "Reusing OVMF.fd from $PREV_TAG (commit $OVMF_COMMIT, sha256 $ACTUAL)"
              else
                echo "::warning::OVMF.fd from $PREV_TAG does not match its build-info sha256 — rebuilding OVMF"
              fi
            fi

            if [ "$WANT_KERNEL" -eq 1 ] && [ -f prev-release/vmlinuz ]; then
              ACTUAL="$(sha256sum prev-release/vmlinuz | awk '{print $1}')"
              if [ "$ACTUAL" = "$(info_prev KERNEL_SHA256)" ]; then
                cp prev-release/vmlinuz output/qemu/vmlinuz
                REUSE_KERNEL=1
                echo "Reusing vmlinuz from $PREV_TAG (version $KERNEL_VERSION, sha256 $ACTUAL)"
              else
                echo "::warning::vmlinuz from $PREV_TAG does not match its build-info sha256 — rebuilding kernel"
              fi
            fi

            # Seed build-info with the previous release's values: build.sh
            # merges with an existing build-info.txt and only overwrites
            # fields for components it actually builds, so the reused
            # components keep their recorded provenance (including the
            # OVMF_* pins and output sha256s).
            if [ "$REUSE_OVMF" -eq 1 ] || [ "$REUSE_KERNEL" -eq 1 ]; then
              cp prev-release/build-info.txt output/qemu/build-info.txt
            fi
          fi

          rm -rf prev-release
          {
            echo "REUSE_OVMF=$REUSE_OVMF"
            echo "REUSE_KERNEL=$REUSE_KERNEL"
            echo "PREV_RELEASE_TAG=$PREV_TAG"
          } >> "$GITHUB_ENV"

      - name: Build VM image
        run: |
          COMPONENTS="initrd"
          [ "${REUSE_KERNEL:-0}" -eq 1 ] || COMPONENTS="kernel $COMPONENTS"
          [ "${REUSE_OVMF:-0}" -eq 1 ] || COMPONENTS="ovmf $COMPONENTS"
          echo "Building components: $COMPONENTS"
          # shellcheck disable=SC2086
          ./build.sh --katana "$KATANA_BIN" \
            --paymaster-bin "$PAYMASTER_BIN" --vrf-bin "$VRF_BIN" \
            $COMPONENTS

          # Record artifact reuse in the build provenance (flows into the
          # release notes via the embedded build-info.txt).
          if [ "${REUSE_OVMF:-0}" -eq 1 ]; then
            echo "OVMF_REUSED_FROM=$PREV_RELEASE_TAG" >> output/qemu/build-info.txt
          fi
          if [ "${REUSE_KERNEL:-0}" -eq 1 ]; then
            echo "KERNEL_REUSED_FROM=$PREV_RELEASE_TAG" >> output/qemu/build-info.txt
          fi

      - name: Record embedded katana version
        # build-info only records the binary's sha256; pin the human-readable
        # katana release tag too, so the provenance is self-describing and
        # reproduce-release.sh can cross-check it against the +katana- tag
        # suffix. KATANA_ASSET_VARIANT tells reproduce-release.sh which
        # release asset to fetch (`native` → *_linux_amd64_native.tar.gz);
        # pre-native releases have no such key and fall back to the portable
        # asset.
        env:
          KATANA_VER: ${{ steps.ctx.outputs.katana_ver }}
        run: |
          {
            echo "KATANA_VERSION=${KATANA_VER}"
            echo "KATANA_ASSET_VARIANT=native"
          } >> output/qemu/build-info.txt

      - name: Obtain snp-digest
        # Needed by the next step to compute the published launch measurement.
        # Preferred source: the snp-tools-v* release pinned in build-config
        # (SNP_DIGEST_RELEASE + SNP_DIGEST_SHA256, cut by the
        # amdsev-snp-tools-release workflow), checksum-verified — the same
        # binary install.sh uses on SNP hosts, so the publisher and the
        # verifiers run identical code. Empty pins fall back to building the
        # crate from this checkout (snp-tools/.cargo/config.toml pins
        # build.target, so the binary lands under target/<triple>/release;
        # locate it explicitly rather than hardcoding the triple).
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          . ./build-config
          if [ -n "${SNP_DIGEST_RELEASE:-}" ]; then
            if [[ ! "${SNP_DIGEST_SHA256:-}" =~ ^[0-9a-f]{64}$ ]]; then
              echo "SNP_DIGEST_RELEASE is pinned but SNP_DIGEST_SHA256 is not a sha256" >&2
              exit 1
            fi
            echo "Downloading pinned snp-digest from ${SNP_DIGEST_RELEASE}"
            gh release download "$SNP_DIGEST_RELEASE" --repo "$GITHUB_REPOSITORY" \
              --pattern "snp-digest-${SNP_DIGEST_RELEASE}" --output snp-digest
            actual="$(sha256sum snp-digest | awk '{print $1}')"
            if [ "$actual" != "$SNP_DIGEST_SHA256" ]; then
              echo "pinned snp-digest checksum mismatch: got $actual, want $SNP_DIGEST_SHA256" >&2
              exit 1
            fi
            chmod +x snp-digest
            ./snp-digest --help >/dev/null
            echo "SNP_DIGEST=$PWD/snp-digest" >> "$GITHUB_ENV"
          else
            echo "No SNP_DIGEST_RELEASE pin in build-config — building snp-tools from source"
            cd snp-tools
            cargo build --release
            SNP_DIGEST="$(find target -type f -name snp-digest -perm -u+x | head -n1)"
            if [ -z "$SNP_DIGEST" ]; then
              echo "snp-digest binary not found after build" >&2
              exit 1
            fi
            echo "SNP_DIGEST=$PWD/$SNP_DIGEST" >> "$GITHUB_ENV"
          fi

      - name: Compute sealed launch measurement
        run: |
          . ./build-config
          . ./scripts/sealed-cmdline.sh
          LUKS_UUID="$KATANA_CANONICAL_LUKS_UUID"
          # Validate canonical UUID format (matches start-vm.sh).
          if [[ ! "$LUKS_UUID" =~ ^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$ ]]; then
            echo "KATANA_CANONICAL_LUKS_UUID is not a canonical lowercase UUID: $LUKS_UUID" >&2
            exit 1
          fi
          CMDLINE="$(build_sealed_cmdline "$LUKS_UUID")"
          DIGEST=$("$SNP_DIGEST" \
            --ovmf=output/qemu/OVMF.fd \
            --kernel=output/qemu/vmlinuz \
            --initrd=output/qemu/initrd.img \
            --append="$CMDLINE" \
            --vcpus=1 --cpu=epyc-v4 --vmm=qemu --guest-features=0x1)
          # Validate digest is a 96-char lowercase hex string.
          # SEV-SNP launch measurement is SHA-384 (48 bytes / 96 hex chars).
          if [[ ! "$DIGEST" =~ ^[0-9a-f]{96}$ ]]; then
            echo "snp-digest produced unexpected output: $DIGEST" >&2
            exit 1
          fi
          echo "Launch measurement: $DIGEST"
          echo "$DIGEST" > output/qemu/launch-measurement.txt
          {
            echo ""
            echo "# Sealed launch measurement (canonical project-wide LUKS_UUID from build-config)"
            echo "LUKS_UUID=${LUKS_UUID}"
            echo "LAUNCH_MEASUREMENT=${DIGEST}"
          } >> output/qemu/build-info.txt

      - name: Stage release artifacts
        env:
          VM_TAG: ${{ steps.ctx.outputs.vm_tag }}
        run: |
          mkdir -p release
          tag="${VM_TAG:-dev}"
          tar -czf "release/katana-tee-vm-${tag}.tar.gz" -C output/qemu .
          cp output/qemu/build-info.txt "release/build-info-${tag}.txt"
          cp output/qemu/launch-measurement.txt "release/launch-measurement-${tag}.txt"

      - name: Generate release notes
        if: steps.ctx.outputs.publish == '1'
        env:
          VM_TAG: ${{ steps.ctx.outputs.vm_tag }}
          KATANA_VER: ${{ steps.ctx.outputs.katana_ver }}
        run: |
          # VM_TAG/KATANA_VER come from the env: block above; shellcheck
          # cannot see it and reads the lowercase alias as a misspelling.
          tag="${VM_TAG}"
          # shellcheck disable=SC2153
          katana_ver="${KATANA_VER}"
          # For SNP_DIGEST_RELEASE (the pinned verifier named in the notes).
          . ./build-config
          # Pull values from build-info.txt for the human-readable summary.
          info_get() {
            awk -F= -v k="$1" '$1 == k { sub(/^[^=]*=/, ""); print; exit }' output/qemu/build-info.txt
          }
          OVMF_SHA="$(info_get OVMF_SHA256)"
          KERNEL_SHA="$(info_get KERNEL_SHA256)"
          INITRD_SHA="$(info_get INITRD_SHA256)"
          KATANA_SHA="$(info_get KATANA_BINARY_SHA256)"
          PAYMASTER_SHA="$(info_get PAYMASTER_BINARY_SHA256)"
          VRF_SHA="$(info_get VRF_BINARY_SHA256)"
          # Sidecar source pins, from the same file release.yml's
          # build-sidecars job builds them from.
          sidecar_rev() {
            awk -v section="[$1]" '$0 == section {in_s=1; next} /^\[/ {in_s=0} in_s && $1 == "rev" {gsub(/"/, "", $3); print $3; exit}' ../../sidecar-versions.toml
          }
          PAYMASTER_REV="$(sidecar_rev paymaster-service)"
          VRF_REV="$(sidecar_rev vrf-server)"
          LUKS_UUID="$(info_get LUKS_UUID)"
          LAUNCH_MEASUREMENT="$(info_get LAUNCH_MEASUREMENT)"
          OVMF_GIT_URL="$(info_get OVMF_GIT_URL)"
          OVMF_BRANCH="$(info_get OVMF_BRANCH)"
          OVMF_COMMIT="$(info_get OVMF_COMMIT)"
          KERNEL_VERSION="$(info_get KERNEL_VERSION)"
          {
            echo "# Katana TEE VM ${tag}"
            echo
            echo "Sealed-mode SEV-SNP confidential VM image bundling Katana **${katana_ver}**"
            echo "(cairo-native build — in-guest native execution is available behind katana's"
            echo "\`--enable-native-compilation\` flag, off by default; deployments opt in via"
            echo "their fw_cfg \`--katana-args\`)."
            echo
            echo "## Sealed launch measurement (SHA-384)"
            echo
            echo '```'
            echo "LUKS_UUID            = ${LUKS_UUID}"
            echo "LAUNCH_MEASUREMENT   = ${LAUNCH_MEASUREMENT}"
            echo '```'
            echo
            echo "This is the launch measurement that attestation verifiers should compare"
            echo "against. It is bound to the canonical project-wide \`LUKS_UUID\` from"
            echo "\`misc/AMDSEV/build-config\`. Operators running with a different LUKS_UUID"
            echo "must recompute their expected measurement via \`./verify-build.sh\` or"
            echo "\`snp-tools/snp-digest\`."
            echo
            echo "## Component checksums (SHA-256)"
            echo
            echo "| Artifact | SHA-256 |"
            echo "|---|---|"
            echo "| \`OVMF.fd\` (guest BIOS firmware) | \`${OVMF_SHA}\` |"
            echo "| \`vmlinuz\` (kernel)              | \`${KERNEL_SHA}\` |"
            echo "| \`initrd.img\`                    | \`${INITRD_SHA}\` |"
            echo "| \`katana\` (cairo-native build)   | \`${KATANA_SHA}\` |"
            echo "| \`paymaster-service\` (embedded in \`initrd.img\`) | \`${PAYMASTER_SHA}\` |"
            echo "| \`vrf-server\` (embedded in \`initrd.img\`)        | \`${VRF_SHA}\` |"
            echo
            echo "## Pinned upstream sources"
            echo
            echo "| Component | Source | Pin |"
            echo "|---|---|---|"
            echo "| OVMF (guest BIOS) | [\`${OVMF_GIT_URL}\`](${OVMF_GIT_URL%.git}/tree/${OVMF_COMMIT}) (branch \`${OVMF_BRANCH}\`) | \`${OVMF_COMMIT}\` |"
            echo "| Linux kernel      | Ubuntu \`linux-image-unsigned-${KERNEL_VERSION}-generic\` .deb | sha256 \`$(info_get KERNEL_PKG_SHA256)\` |"
            echo "| Katana            | [\`dojoengine/katana\`](https://github.com/dojoengine/katana/releases/tag/${katana_ver}) (\`katana_${katana_ver}_linux_amd64_native.tar.gz\`) | \`${katana_ver}\` |"
            echo "| paymaster-service | [\`cartridge-gg/paymaster\`](https://github.com/cartridge-gg/paymaster) (prebuilt \`${katana_ver}\` release asset) | \`${PAYMASTER_REV}\` |"
            echo "| vrf-server        | [\`cartridge-gg/vrf\`](https://github.com/cartridge-gg/vrf) (prebuilt \`${katana_ver}\` release asset) | \`${VRF_REV}\` |"
            echo
            echo "## Verify before booting"
            echo
            echo '```sh'
            echo "mkdir -p /tmp/katana-tee-vm && tar xzf katana-tee-vm-${tag}.tar.gz -C /tmp/katana-tee-vm"
            echo "misc/AMDSEV/verify-build.sh /tmp/katana-tee-vm"
            echo '```'
            echo
            echo "The verifier asserts every sha256 above and re-derives the launch measurement"
            echo "from \`OVMF.fd\` + \`vmlinuz\` + \`initrd.img\` + the canonical LUKS_UUID. Exits"
            echo "non-zero on any mismatch. For full from-source reproduction, see"
            echo "\`misc/AMDSEV/reproduce-release.sh\`."
            echo
            if [ -n "${SNP_DIGEST_RELEASE:-}" ]; then
              echo "The measurement above was computed with snp-digest from"
              echo "\`${SNP_DIGEST_RELEASE}\` (pinned in \`misc/AMDSEV/build-config\`) —"
              echo "hosts running \`misc/AMDSEV/install.sh\` download and checksum-verify"
              echo "the same pinned binary."
            else
              echo "The measurement above was computed with snp-digest built from this"
              echo "tag's \`misc/AMDSEV/snp-tools\` source (no prebuilt pinned in"
              echo "\`misc/AMDSEV/build-config\`)."
            fi
            echo
            echo "## Full build provenance"
            echo
            echo "<details>"
            echo "<summary><code>build-info.txt</code></summary>"
            echo
            echo '```'
            cat output/qemu/build-info.txt
            echo '```'
            echo
            echo "</details>"
          } > release/release-notes.md

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: katana-tee-vm
          path: misc/AMDSEV/release/

      - name: Create GitHub Release
        if: steps.ctx.outputs.publish == '1'
        uses: softprops/action-gh-release@v2
        with:
          # The tee-vm-v* tag does not exist yet; action-gh-release creates it
          # at the built commit (target_commitish). prerelease is set when the
          # TEE version or the embedded katana version is a pre-release.
          tag_name: ${{ steps.ctx.outputs.vm_tag }}
          target_commitish: ${{ steps.ctx.outputs.sha }}
          prerelease: ${{ steps.ctx.outputs.prerelease }}
          body_path: misc/AMDSEV/release/release-notes.md
          files: |
            misc/AMDSEV/release/katana-tee-vm-*.tar.gz
            misc/AMDSEV/release/build-info-*.txt
            misc/AMDSEV/release/launch-measurement-*.txt

      - name: Trigger hardware E2E test
        # The VM release was created with GITHUB_TOKEN, which does not
        # re-trigger workflows via the release event — so dispatch the
        # hardware test explicitly (workflow_dispatch IS permitted from
        # GITHUB_TOKEN). amdsev-snp-e2e checks out the VM tag, which now
        # exists.
        if: steps.ctx.outputs.publish == '1'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VM_TAG: ${{ steps.ctx.outputs.vm_tag }}
        run: gh workflow run amdsev-snp-e2e.yml -f tag="$VM_TAG"
